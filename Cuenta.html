<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bank of America - Inicio de Sesión</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .login-container {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
    }
    .logo {
      text-align: center;
      margin-bottom: 30px;
    }
    .logo h1 {
      color: #d40511;
      font-size: 28px;
    }
    .formulario-grupo {
      margin-bottom: 20px;
    }
    .formulario-grupo label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: bold;
    }
    .formulario-grupo input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 16px;
      font-family: Arial, sans-serif;
    }
    .formulario-grupo input:focus {
      outline: none;
      border-color: #d40511;
      box-shadow: 0 0 5px rgba(212, 5, 17, 0.3);
    }
    .boton-enviar {
      width: 100%;
      padding: 12px;
      background-color: #d40511;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    .boton-enviar:hover {
      background-color: #b1040d;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <h1>Bank of America</h1>
      <p>Banca Digital Segura</p>
    </div>
    
    <form id="formularioLogin">
      <div class="formulario-grupo">
        <label for="correo">Correo Electrónico</label>
        <input type="email" id="correo" required placeholder="tu@email.com">
      </div>
      
      <div class="formulario-grupo">
        <label for="contraseña">Contraseña</label>
        <input type="password" id="contraseña" required placeholder="Tu contraseña">
      </div>
      
      <button type="submit" class="boton-enviar">Iniciar Sesión</button>
    </form>
  </div>

  <!-- ✅ IMPORTANTE: Cargar primero datos.js, luego script.js -->
  <script src="datos.js"></script>
  <script src="script.js"></script>
</body>
</html>
